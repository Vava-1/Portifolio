# Hourly sync of the portfolio agent. Hits /api/agent/sync with the CRON_SECRET
# bearer token, which the proxy middleware accepts as an alternative to admin
# session auth.
#
# Why GitHub Actions instead of Vercel Cron? The Vercel hobby plan rejects
# vercel.json with crons, which fails the entire build. GitHub Actions is free
# and runs reliably on a schedule.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SYNC_URL    The full URL to the sync endpoint, e.g.
#               https://portifolio-eight-chi-87.vercel.app/api/agent/sync
#   CRON_SECRET A long random string. Must match the CRON_SECRET env var set
#               in Vercel. The agent will reject sync requests without it.

name: Agent hourly sync

on:
  schedule:
    # Top of every hour, UTC.
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger agent sync
        run: |
          if [ -z "${{ secrets.SYNC_URL }}" ]; then
            echo "SYNC_URL secret is not set. Skipping."
            exit 0
          fi
          echo "Hitting ${{ secrets.SYNC_URL }} ..."
          curl -sSf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SYNC_URL }}" \
            -o sync-response.json -w "HTTP %{http_code}\n"
          echo "--- Response ---"
          cat sync-response.json || true
